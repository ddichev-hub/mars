---
# tasks file for backup
- ansible.builtin.include_tasks: 10x_backup.yml 
  when: (ansible_network_os == "saos10x") and (crud == 'create' or crud == 'delete')
  tags:
    - create
    - delete

- ansible.builtin.include_tasks: 10x_backup_apply.yml 
  when: (ansible_network_os == "saos10x") and (crud == 'apply')
  tags:
    - apply

- ansible.builtin.include_tasks: 8x_backup.yml 
  when: (ansible_network_os == "saos8x") and (crud == 'create' or crud == 'delete')
  tags:
    - create
    - delete

- ansible.builtin.include_tasks: 8x_backup_apply.yml 
  when: (ansible_network_os == "saos8x") and (crud == 'apply')
  tags:
    - apply


- ansible.builtin.include_tasks: 6x_backup.yml 
  when: (ansible_network_os == "saos6x") and (crud == 'create' or crud == 'delete')
  tags:
    - create
    - delete

- ansible.builtin.include_tasks: 6x_backup_apply.yml 
  when: (ansible_network_os == "saos6x") and (crud == 'apply')
  tags:
    - apply

